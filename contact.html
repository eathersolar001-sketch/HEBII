<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEBI - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ======= NAVBAR ======= -->
  <header class="navbar">
    <div class="navbar-left">
      <div class="logo">
        <img src="logo.png" alt="Logo de la marque">
      </div>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="nouveaute.html">Nouveauté</a>
        <a href="boutique.html">Boutique</a>
        <a href="panier.html">Panier</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <!-- ======= SECTION CONTACT ======= -->
  <section class="contact">
    <div class="container">
      <h1>Contactez-nous</h1>
      <p class="intro-text">
        Une question sur un produit, un problème avec votre commande ou simplement envie d’en savoir plus ?  
        N’hésitez pas à nous écrire, notre équipe vous répondra dans les plus brefs délais.
      </p>

      <form class="contact-form" id="contact-form">
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" required placeholder="Votre nom complet">
        </div>

        <div class="form-group">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" name="email" required placeholder="exemple@email.com">
        </div>

        <div class="form-group">
          <label for="sujet">Sujet</label>
          <input type="text" id="sujet" name="sujet" required placeholder="Sujet de votre message">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required placeholder="Écrivez votre message ici..."></textarea>
        </div>

        <button type="submit" class="btn-primary">Envoyer le message</button>
      </form>
    </div>
  </section>

  <!-- ======= FOOTER ======= -->
  <footer class="footer">
    <p>&copy; 2025 HEBI — Tous droits réservés</p>
  </footer>

  <!-- ======= SCRIPT CONTACT (simulation) ======= -->
  <script>
    document.getElementById("contact-form").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("Merci pour votre message ! Nous vous répondrons bientôt.");
      this.reset();
    });
  </script>

</body>
</html>
